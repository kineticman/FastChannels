<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ channel.name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      cursor: pointer;
      z-index: 10;
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    #overlay.hidden { display: none; }
    #overlay img {
      max-height: 72px;
      max-width: 240px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    }
    #overlay h1 {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      max-width: 80vw;
    }
    #overlay .hint {
      font-size: 0.9rem;
      color: #aaa;
    }
    #overlay .hint.error {
      color: #f88;
    }
    #status {
      position: fixed;
      bottom: 0.75rem;
      left: 1rem;
      right: 1rem;
      color: rgba(255,255,255,0.55);
      font-size: 0.75rem;
      font-family: monospace;
      pointer-events: none;
      z-index: 5;
      text-align: center;
    }
    #cc-indicator {
      position: fixed;
      top: 0.75rem;
      right: 1rem;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.75rem;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2px 8px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #cc-indicator.show { opacity: 1; }
  </style>
</head>
<body>
  <video id="player" playsinline autoplay muted></video>

  <div id="overlay">
    {% if channel.logo_display_url %}
    <img src="{{ channel.logo_display_url }}" alt="">
    {% elif channel.logo_url %}
    <img src="{{ channel.logo_url }}" alt="">
    {% endif %}
    <h1>{{ channel.name }}</h1>
    <div class="hint" id="overlay-hint">
      {% if playback_mode == 'unsupported' %}
        Stream type ({{ stream_type }}) is not supported for browser playback.
      {% else %}
        Click, Space, or F to play fullscreen &nbsp;·&nbsp; C toggles captions
      {% endif %}
    </div>
  </div>

  <div id="status"></div>
  <div id="cc-indicator"></div>

  <script>
    const PLAY_URL      = {{ play_url | tojson }};
    const PLAYBACK_MODE = {{ playback_mode | tojson }};
    const STREAM_TYPE   = {{ stream_type | tojson }};
    const LICENSE_URL   = {{ license_url | tojson }};
    const WATCH_DEBUG   = {{ watch_debug | default(false) | tojson }};
    const REQUEST_ID    = {{ request_id | default('') | tojson }};
    const MAX_HEIGHT    = {{ max_height | default(0) | tojson }};
    const WATCH_DEBUG_URL = {{ url_for('play.watch_debug', channel_id=channel.id) | tojson }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.compiled.js"></script>
  <script src="{{ url_for('static', filename='js/fc_player.js') }}?v={{ app_version }}"></script>
  <script>
    const video       = document.getElementById('player');
    const overlay     = document.getElementById('overlay');
    const hint        = document.getElementById('overlay-hint');
    const status      = document.getElementById('status');
    const ccIndicator = document.getElementById('cc-indicator');

    let _shaka = null;
    let _debugSeq = 0;
    const _debugT0 = Date.now();

    function _bufferedEnd() {
      try {
        if (!video.buffered || !video.buffered.length) return null;
        return Number(video.buffered.end(video.buffered.length - 1).toFixed(3));
      } catch (_) {
        return null;
      }
    }

    function emitWatchDebug(event, extra = {}) {
      if (!WATCH_DEBUG) return;
      const bufferedEnd = _bufferedEnd();
      const quality = video.getVideoPlaybackQuality ? video.getVideoPlaybackQuality() : null;
      const payload = {
        event,
        seq: ++_debugSeq,
        age_ms: Date.now() - _debugT0,
        current_time: Number((video.currentTime || 0).toFixed(3)),
        ready_state: video.readyState,
        network_state: video.networkState,
        paused: video.paused,
        ended: video.ended,
        seeking: video.seeking,
        buffered_end: bufferedEnd,
        buffered_ahead: bufferedEnd == null ? null : Number((bufferedEnd - (video.currentTime || 0)).toFixed(3)),
        video_size: `${video.videoWidth || 0}x${video.videoHeight || 0}`,
        dropped: quality ? quality.droppedVideoFrames : null,
        decoded: quality ? quality.totalVideoFrames : null,
        request_id: REQUEST_ID,
        extra,
      };
      const body = JSON.stringify(payload);
      try {
        if (navigator.sendBeacon) {
          const ok = navigator.sendBeacon(WATCH_DEBUG_URL, new Blob([body], { type: 'application/json' }));
          if (ok) return;
        }
      } catch (_) {}
      fetch(WATCH_DEBUG_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
        keepalive: true,
      }).catch(() => {});
    }

    function setStatus(msg) {
      if (status) status.textContent = msg;
    }

    const _chromeDrmTip = '<br><small style="font-size:0.8em;color:#bbb">Chrome tip: paste <code style="background:rgba(255,255,255,0.1);padding:1px 4px;border-radius:3px">chrome://flags/#unsafely-treat-insecure-origin-as-secure</code> into the address bar, add this origin, and relaunch.</small>';
    const _diagnosticRef = REQUEST_ID
      ? '<br><small style="font-size:0.75em;color:#aaa">Diagnostic ID: <code>'
        + String(REQUEST_ID).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
        + '</code></small>'
      : '';

    function setError(msg, includeDrmTip) {
      hint.innerHTML = msg + (includeDrmTip ? _chromeDrmTip : '') + _diagnosticRef;
      hint.className = 'hint error';
    }

    function onPlayerError(info) {
      const { phase, err } = info;
      emitWatchDebug('player-error', {
        phase,
        code: err && err.code,
        category: err && err.category,
        severity: err && err.severity,
        data: err && err.data,
        message: info && info.message,
      });
      if (phase === 'browser-unsupported') {
        setError('Playback is not supported in this browser.');
      } else if (phase === 'drm-insecure') {
        setError('DRM streams require a secure context (HTTPS or a browser-trusted origin).', true);
      } else if (phase === 'event') {
        // Runtime error during playback — keep the fullscreen overlay clean, use the status line.
        const code = err && err.code;
        if (code === 6007 || code === 6008) setStatus('DRM: license rejected');
        else if (code === 6020) setStatus('DRM: requires HTTPS');
        else if (code === 1001 || code === 1002) setStatus('Network error loading stream');
        else if (code) setStatus('Shaka error ' + code + (REQUEST_ID ? ' · Ref ' + REQUEST_ID : ''));
      } else if (phase === 'load') {
        const code = err && err.code;
        if (code === 4042) {
          setError('Stream uses AES-128 encryption — requires Safari or a native HLS player.');
        } else {
          setError('Could not load stream: ' + (err && err.message || err));
        }
      }
    }

    function initPlayer() {
      emitWatchDebug('init', { mode: PLAYBACK_MODE, type: STREAM_TYPE, has_license: Boolean(LICENSE_URL), max_height: MAX_HEIGHT });
      if (PLAYBACK_MODE === 'unsupported' || !PLAY_URL) return;
      _shaka = FCPlayer.load({
        video,
        url: PLAY_URL,
        mode: PLAYBACK_MODE,
        type: STREAM_TYPE,
        license: LICENSE_URL,
        maxHeight: MAX_HEIGHT,
        onStatus: () => {},   // fullscreen overlay stays clean on success / native playback
        onError: onPlayerError,
      });
      if (_shaka) {
        _shaka.addEventListener('buffering', (event) => {
          emitWatchDebug('shaka-buffering', { buffering: Boolean(event.buffering) });
        });
        _shaka.addEventListener('adaptation', () => emitWatchDebug('shaka-adaptation'));
        _shaka.addEventListener('variantchanged', () => emitWatchDebug('shaka-variantchanged'));
      }
    }

    function activateFullscreen() {
      if (PLAYBACK_MODE === 'unsupported' || !PLAY_URL) return;
      if (overlay.classList.contains('hidden')) return;
      emitWatchDebug('activate-fullscreen');
      video.muted = false;
      video.volume = 1.0;
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      overlay.classList.add('hidden');
    }

    overlay.addEventListener('click', activateFullscreen);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === ' ' || e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        activateFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) overlay.classList.remove('hidden');
    });

    let captionsOn = false;
    let _ccTimer;

    function showCcIndicator(on) {
      ccIndicator.textContent = on ? 'CC On' : 'CC Off';
      ccIndicator.classList.add('show');
      clearTimeout(_ccTimer);
      _ccTimer = setTimeout(() => ccIndicator.classList.remove('show'), 1800);
    }

    function applyCaptions() {
      const mode = captionsOn ? 'showing' : 'hidden';
      for (const track of video.textTracks) {
        if (track.kind === 'subtitles' || track.kind === 'captions') track.mode = mode;
      }
    }

    video.textTracks.addEventListener('addtrack', applyCaptions);

    if (WATCH_DEBUG) {
      ['loadstart', 'loadedmetadata', 'loadeddata', 'canplay', 'playing', 'waiting',
       'stalled', 'suspend', 'pause', 'ended', 'seeking', 'seeked', 'error', 'encrypted'].forEach((name) => {
        video.addEventListener(name, () => emitWatchDebug('video-' + name, {
          error_code: video.error && video.error.code,
          error_message: video.error && video.error.message,
        }));
      });
      setInterval(() => emitWatchDebug('heartbeat'), 5000);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'c' || e.key === 'C') {
        captionsOn = !captionsOn;
        applyCaptions();
        showCcIndicator(captionsOn);
      }
    });

    initPlayer();
  </script>
</body>
</html>
